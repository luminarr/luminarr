services:
  luminarr:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: luminarr:local
    container_name: luminarr
    restart: unless-stopped
    ports:
      - "8282:8282"
    volumes:
      - ${HOME}/.config/luminarr:/config
      # Mount your movies directory. The container path (/movies) must match
      # the root path you configure in Settings > Libraries.
      # Add additional lines for each root folder you want accessible.
      - /path/to/movies:/movies
