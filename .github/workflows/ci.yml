name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write  # required to push to ghcr.io

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests (with race detector)
        run: go test -race -timeout 120s ./...

      - name: Run tests (coverage)
        run: go test -coverprofile=coverage.out -timeout 120s ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/luminarr/luminarr/internal/version.Version=${VERSION} \
                      -X github.com/luminarr/luminarr/internal/version.BuildTime=${BUILD_TIME} \
                      -X github.com/luminarr/luminarr/internal/config.DefaultTMDBKey=${TMDB_API_KEY} \
                      -s -w" \
            -o bin/luminarr ./cmd/luminarr

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: luminarr-linux-amd64
          path: bin/luminarr
          retention-days: 7

  docker:
    name: Docker
    runs-on: ubuntu-latest
    # Only build and push images on pushes to main (not PRs).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, build]
    permissions:
      contents: read
      packages: write  # required to push to ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GHCR_TOKEN is a classic PAT with write:packages scope.
          # GITHUB_TOKEN consistently 403s on blob HEAD checks for new packages.
          # Token expires ~2026-06-01 — renew and update secret before then.
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (latest — scratch/minimal)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: false

      - name: Build and push (latest-full — alpine with ffprobe)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.full
          push: true
          tags: ghcr.io/${{ github.repository }}:latest-full
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: false
